<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E31E1E"/>
      <stop offset="100%" stop-color="#CC1212"/>
    </linearGradient>
  </defs>

  <!-- background: white card, same feel as the app UI -->
  <rect width="512" height="512" rx="100" fill="#ffffff"/>
  <rect x="4" y="4" width="504" height="504" rx="97" fill="none" stroke="#e0e0e0" stroke-width="6"/>

  <!-- document outline (folder/page mark, like the Anexo logo) -->
  <path d="M 168 128
           L 268 128
           L 320 180
           L 320 372
           Q 320 388 304 388
           L 184 388
           Q 168 388 168 372
           Z"
        fill="none" stroke="#1a1a1a" stroke-width="14" stroke-linejoin="round"/>
  <!-- folded corner of the page -->
  <path d="M 268 128 L 268 172 Q 268 180 276 180 L 320 180" fill="none" stroke="#1a1a1a" stroke-width="14" stroke-linejoin="round"/>

  <!-- red brush swoosh accent, top-left of the document (as in the real logo) -->
  <path d="M 118 158 C 108 178, 118 200, 144 196 C 160 193, 158 172, 140 168 C 128 165, 122 150, 138 140"
        fill="none" stroke="url(#acc)" stroke-width="15" stroke-linecap="round"/>

  <!-- PDF tag on the document -->
  <rect x="196" y="228" width="96" height="60" rx="10" fill="url(#acc)"/>
  <text x="244" y="270" font-family="'Montserrat','Arial',sans-serif" font-weight="900" font-size="28" fill="#fff" text-anchor="middle" letter-spacing="0.5">PDF</text>

  <!-- rename lines -->
  <rect x="196" y="304" width="96" height="9" rx="4.5" fill="#d8d8d8"/>
  <rect x="196" y="324" width="70" height="9" rx="4.5" fill="#d8d8d8"/>

  <!-- brand wordmark, bottom -->
  <text x="256" y="452" font-family="'Montserrat','Arial',sans-serif" font-weight="800" font-size="46" text-anchor="middle" letter-spacing="0.5">
    <tspan fill="#1a1a1a">a</tspan><tspan fill="url(#acc)">NEXO</tspan>
  </text>
</svg>
